# Canonical task runner for hpgl-buddy. Local, Docker, and CI all invoke tox so
# behavior is identical everywhere.
#
#   tox            run the test suite on every supported Python (3.11-3.13)
#   tox -e py312   run the suite on one specific version
#   tox -e build   build the sdist + wheel into dist/
#
# Interpreters not installed locally are skipped (CI provides the full matrix).
# The floor is 3.11 because device profiles are read with the stdlib tomllib.

[tox]
envlist = py311, py312, py313
isolated_build = True
skip_missing_interpreters = true

[testenv]
description = Run the unit test suite.
deps = pytest>=8
commands = pytest {posargs}

[testenv:build]
description = Build the distributable sdist and wheel.
skip_install = True
deps = build>=1.2
commands = python -m build
