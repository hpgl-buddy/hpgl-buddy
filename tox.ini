# Canonical task runner for hpgl-buddy. Local, Docker, and CI all invoke tox so
# behavior is identical everywhere.
#
#   tox            run the test suite on Python 3.13
#   tox -e build   build the sdist + wheel into dist/

[tox]
envlist = py313
isolated_build = True

[testenv]
description = Run the unit test suite.
deps = pytest>=8
commands = pytest {posargs}

[testenv:build]
description = Build the distributable sdist and wheel.
skip_install = True
deps = build>=1.2
commands = python -m build
