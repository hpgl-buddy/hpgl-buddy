name: dependencies_update

# Regenerate the fully-pinned requirements.txt from requirements-rough.txt:
#   clean Python env -> install rough -> pip freeze -> diff against current.
# The diff is always reported. The file is only committed back when the
# `apply` input is true, so a normal run is a safe dry-run / drift check.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Commit the regenerated requirements.txt if it changed"
        type: boolean
        default: false
  # Weekly drift check (dry-run; never commits on schedule).
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Freeze a clean environment
        run: |
          set -euo pipefail
          python -m venv /tmp/depenv
          /tmp/depenv/bin/python -m pip install --upgrade pip
          /tmp/depenv/bin/python -m pip install -r requirements-rough.txt
          {
            echo "# AUTO-GENERATED by the dependencies_update workflow from requirements-rough.txt."
            echo "# Do not edit by hand."
            /tmp/depenv/bin/python -m pip freeze --exclude-editable
          } > requirements.generated.txt
          echo "----- generated requirements -----"
          cat requirements.generated.txt

      - name: Compare with committed requirements.txt
        id: diff
        run: |
          set +e
          touch requirements.txt
          if diff -u requirements.txt requirements.generated.txt > requirements.diff; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "requirements.txt is up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Dependency drift detected:"
            cat requirements.diff
          fi

      - name: Upload diff and generated file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: requirements-update
          path: |
            requirements.generated.txt
            requirements.diff

      - name: Commit updated requirements.txt
        if: steps.diff.outputs.changed == 'true' && inputs.apply
        run: |
          set -euo pipefail
          mv requirements.generated.txt requirements.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git commit -m "chore(deps): regenerate pinned requirements.txt"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            if [ "${{ inputs.apply }}" = "true" ]; then
              echo "Drift detected and committed." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Drift detected (dry-run; re-run with apply=true to commit)." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No dependency drift." >> "$GITHUB_STEP_SUMMARY"
          fi
