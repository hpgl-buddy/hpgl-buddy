name: dependencies_update

# Regenerate the fully-pinned requirement files from their rough sources:
#   requirements-rough.txt      -> requirements.txt       (runtime)
#   requirements-dev-rough.txt  -> requirements-dev.txt   (dev / CI tooling)
# For each: clean Python env -> install rough -> pip freeze -> diff against the
# committed file. Diffs are always reported. Files are only committed back when
# the `apply` input is true, so a normal/scheduled run is a safe drift check.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Commit the regenerated requirement files if they changed"
        type: boolean
        default: false
  # Weekly drift check (dry-run; never commits on schedule).
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Freeze clean environments and diff
        id: diff
        run: |
          set -euo pipefail
          changed=false
          for pair in \
            "requirements-rough.txt:requirements.txt" \
            "requirements-dev-rough.txt:requirements-dev.txt"; do
            rough="${pair%%:*}"
            pinned="${pair##*:}"
            venv="/tmp/depenv-$(basename "$pinned" .txt)"
            python -m venv "$venv"
            "$venv/bin/python" -m pip install --upgrade pip >/dev/null
            "$venv/bin/python" -m pip install -r "$rough"
            {
              echo "# AUTO-GENERATED by the dependencies_update workflow from ${rough}."
              echo "# Do not edit by hand."
              "$venv/bin/python" -m pip freeze --exclude-editable
            } > "${pinned}.generated"
            echo "----- ${pinned} -----"
            cat "${pinned}.generated"
            touch "$pinned"
            if ! diff -u "$pinned" "${pinned}.generated" > "${pinned}.diff"; then
              changed=true
              echo "::notice::Dependency drift in ${pinned}:"
              cat "${pinned}.diff"
            fi
          done
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

      - name: Upload generated files and diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: requirements-update
          path: |
            requirements*.generated
            requirements*.diff
          if-no-files-found: ignore

      - name: Commit regenerated requirement files
        if: steps.diff.outputs.changed == 'true' && inputs.apply
        run: |
          set -euo pipefail
          mv requirements.txt.generated requirements.txt
          mv requirements-dev.txt.generated requirements-dev.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.txt requirements-dev.txt
          git commit -m "chore(deps): regenerate pinned requirements"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            if [ "${{ inputs.apply }}" = "true" ]; then
              echo "Drift detected and committed." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Drift detected (dry-run; re-run with apply=true to commit)." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No dependency drift." >> "$GITHUB_STEP_SUMMARY"
          fi
