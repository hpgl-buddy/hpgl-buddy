name: tests

# Runs the suite across every supported Python on Linux, Windows, and macOS, so
# the cross-platform core (the GUI targets all three) is proven on each. Local and
# Docker also invoke tox; here each job's active interpreter is the version under
# test, so `tox -e py` runs the suite on exactly that Python.

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip pyflakes
      - run: pyflakes src tests

  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version: 
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip tox
      # `py` targets the active interpreter set up above - no env name to derive,
      # and it cannot be skipped (the running Python always exists).
      - run: tox -e py
