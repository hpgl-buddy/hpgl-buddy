name: release

# Cuts a release when master moves to a version not yet tagged:
#   read version.py -> if v<version> is not already a tag -> test, build
#   (sdist + wheel), render changelog, create the tag + GitHub release with the
#   artifacts attached, and publish to PyPI via trusted publishing (OIDC).
# The PyPI publisher is bound to this workflow file name (release.yml), so do
# not rename it.

on:
  push:
    branches: [master]

permissions:
  contents: write   # create the tag and the GitHub release
  id-token: write   # PyPI trusted publishing (OIDC); no API token needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the changelog and tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from version.py
        id: version
        run: |
          version="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/hpgl_buddy/version.py)"
          if [ -z "${version}" ]; then echo "Could not read version" >&2; exit 1; fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Planned release: v${version}"

      - name: Decide whether to release
        id: gate
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists - nothing to release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.13
        if: steps.gate.outputs.should_release == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run the test suite
        if: steps.gate.outputs.should_release == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r requirements-dev.txt   # pinned dev tooling
          python -m pytest -q

      - name: Build sdist and wheel
        if: steps.gate.outputs.should_release == 'true'
        run: |
          # build + twine are already installed (pinned) from requirements-dev.txt.
          python -m build              # -> dist/*.tar.gz and dist/*.whl
          python -m twine check dist/*

      - name: Render changelog from commits since the last tag
        if: steps.gate.outputs.should_release == 'true'
        id: changelog
        uses: reinvented-stuff/changelog-render-action@master
        with:
          long_changelog_export_filename: ".changelog_long.md"
          short_changelog_export_filename: ".changelog_short.md"
          print_out_changelogs: true

      - name: Create tag + GitHub release with artifacts
        if: steps.gate.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: .changelog_long.md
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI (trusted publishing)
        if: steps.gate.outputs.should_release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
